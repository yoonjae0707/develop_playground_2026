<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 모의 주식 거래</title>
    <style>
        /* Google web fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.6);
            --primary-text: #f8fafc;
            --secondary-text: #94a3b8;
            --up-color: #ef4444;    /* 상승장: 빨강 */
            --down-color: #3b82f6;  /* 하락장: 파랑 */
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color));
            color: var(--primary-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            width: 90%;
            max-width: 1400px;
            height: 95vh;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h2 {
            margin-top: 0;
            font-weight: 700;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        /* Stock List */
        .stock-list {
            flex-grow: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            padding-right: 8px;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .stock-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stock-card:hover, .stock-card.selected {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stock-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .stock-price {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stock-history {
            font-size: 0.85rem;
            color: var(--secondary-text);
            display: flex;
            justify-content: space-between;
        }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }
        .neutral { color: var(--secondary-text); }
        
        .price-animation-up { animation: flashUp 0.8s ease-out; }
        .price-animation-down { animation: flashDown 0.8s ease-out; }

        @keyframes flashUp {
            0% { background-color: rgba(239, 68, 68, 0.3); }
            100% { background-color: transparent; }
        }
        @keyframes flashDown {
            0% { background-color: rgba(59, 130, 246, 0.3); }
            100% { background-color: transparent; }
        }

        /* Portfolio */
        .portfolio-item {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        
        .portfolio-value { font-weight: 700; font-family: 'Inter', sans-serif;}
        
        .my-stocks-container {
            margin-top: 15px;
            max-height: 120px;
            overflow-y: auto;
        }
        .my-stock {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 10px 0;
            font-size: 0.95rem;
        }

        /* Bank Panel */
        .bank-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bank-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bank-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .bank-name { font-weight: bold; font-size: 1rem; color: #fbbf24; }
        .bank-desc { font-size: 0.85rem; color: #cbd5e1; }
        .bank-debt { font-size: 0.85rem; color: #ef4444; font-weight: bold;}

        /* Action Form */
        .trading-panel {
            margin-top: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
        }

        .selected-stock-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus { border-color: var(--accent); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            font-family: inherit;
        }
        
        .btn-buy { background: var(--up-color); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
        .btn-buy:hover { background: #dc2626; transform: translateY(-1px); }
        
        .btn-sell { background: var(--down-color); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
        .btn-sell:hover { background: #2563eb; transform: translateY(-1px); }
        
        .btn-loan { background: #64748b; padding: 8px; font-size: 0.85rem;}
        .btn-loan:hover { background: #475569; }
        .btn-repay { background: #059669; padding: 8px; font-size: 0.85rem;}
        .btn-repay:hover { background: #047857; }

        .message-box {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 15px;
            min-height: 20px;
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            body { height: auto; padding: 20px 0; display: block; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 시장 현황 패널 -->
        <div class="glass-panel">
            <h2>📈 전체 주식 시장</h2>
            <div class="stock-list" id="stock-list">
                <!-- Data from JS -->
            </div>
            
            <h2 style="margin-top: 20px;">🏦 대출 (Banks)</h2>
            <div class="bank-container" id="bank-list">
                <!-- Data from JS -->
            </div>
        </div>

        <!-- 포트폴리오 및 거래 패널 -->
        <div class="glass-panel" style="overflow-y: auto;">
            <h2>💰 내 자산</h2>
            
            <div class="portfolio-item">
                <span>자본금 (CASH)</span>
                <span class="portfolio-value" id="cash-value">0 원</span>
            </div>
            <div class="portfolio-item" style="color: #cbd5e1;">
                <span>총 자산 (평가금 + 현금 - 빚)</span>
                <span class="portfolio-value" id="total-asset-value">0 원</span>
            </div>
            <div class="portfolio-item" style="color: #ef4444; background: rgba(239,68,68,0.1);">
                <span>총 대출금 (이자포함)</span>
                <span class="portfolio-value" id="loan-value">0 원</span>
            </div>

            <div class="my-stocks-container" id="my-stocks">
                <!-- 보유 주식 목록 렌더링 -->
            </div>

            <div class="trading-panel">
                <div class="selected-stock-title" id="selected-title">종목을 선택해주세요</div>
                <div class="input-group">
                    <input type="number" id="trade-amount" placeholder="수량 입력 (주)" min="1">
                </div>
                <div class="btn-group">
                    <button class="btn-buy" onclick="trade('buy')">매수</button>
                    <button class="btn-sell" onclick="trade('sell')">매도</button>
                </div>
                <div class="message-box" id="msg-box"></div>
            </div>
        </div>
    </div>
    

    <script>
        let selectedStockId = null;
        let previousStocks = {};

        function formatCurrency(num) {
            return new Intl.NumberFormat('ko-KR').format(num) + ' 원';
        }
        
        function formatPercent(num) {
            const symbol = num > 0 ? "▲" : (num < 0 ? "▼" : "-");
            return `${symbol} ${Math.abs(num).toFixed(2)}%`;
        }

        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();
                renderMarket(data.market);
                renderBanks(data.banks, data.portfolio);
                renderPortfolio(data.portfolio, data.market);
            } catch (err) {
                console.error("서버 연결 실패", err);
            }
        }

        function renderMarket(market) {
            const listEl = document.getElementById('stock-list');
            
            if (listEl.children.length === 0) {
                market.forEach(stock => {
                    const card = document.createElement('div');
                    card.className = 'stock-card';
                    card.id = `stock-${stock.id}`;
                    card.onclick = () => selectStock(stock);
                    
                    card.innerHTML = `
                        <div class="stock-header">
                            <span class="stock-name">${stock.name}</span>
                            <span class="stock-history" id="stock-rate-${stock.id}">0.00%</span>
                        </div>
                        <div class="stock-price">
                            <span id="stock-price-${stock.id}">${formatCurrency(stock.price)}</span>
                        </div>
                    `;
                    listEl.appendChild(card);
                    previousStocks[stock.id] = stock.price;
                });
            } else {
                market.forEach(stock => {
                    const priceEl = document.getElementById(`stock-price-${stock.id}`);
                    const rateEl = document.getElementById(`stock-rate-${stock.id}`);
                    const card = document.getElementById(`stock-${stock.id}`);
                    
                    const oldPrice = previousStocks[stock.id] || stock.price;
                    
                    priceEl.innerText = formatCurrency(stock.price);
                    rateEl.innerText = formatPercent(stock.rate);
                    
                    let colorClass = stock.rate > 0 ? 'up' : (stock.rate < 0 ? 'down' : 'neutral');
                    rateEl.className = `stock-history ${colorClass}`;
                    priceEl.className = `stock-price ${colorClass}`;

                    if (stock.price > oldPrice) {
                        card.classList.remove('price-animation-up', 'price-animation-down');
                        void card.offsetWidth; 
                        card.classList.add('price-animation-up');
                    } else if (stock.price < oldPrice) {
                        card.classList.remove('price-animation-up', 'price-animation-down');
                        void card.offsetWidth;
                        card.classList.add('price-animation-down');
                    }

                    previousStocks[stock.id] = stock.price;
                });
            }
        }
        
        function renderBanks(banks, portfolio) {
            const listEl = document.getElementById('bank-list');
            listEl.innerHTML = '';
            
            banks.forEach(bank => {
                const debt = portfolio.loans[bank.id] || 0;
                const hasLoan = debt > 0;
                
                const card = document.createElement('div');
                card.className = 'bank-card';
                card.innerHTML = `
                    <div class="bank-info">
                        <span class="bank-name">${bank.name} <span style="font-size:0.8rem; color:#94a3b8">(${(bank.interest * 100).toFixed(1)}% 이자)</span></span>
                        ${hasLoan 
                          ? `<span class="bank-debt">갚아야 할 돈: ${formatCurrency(debt)}</span>` 
                          : `<span class="bank-desc">한도: ${formatCurrency(bank.limit)}</span>`}
                    </div>
                    <div>
                        ${hasLoan 
                          ? `<button class="btn-repay" onclick="handleBank('repay', '${bank.id}')">전액 상환</button>`
                          : `<button class="btn-loan" onclick="handleBank('loan', '${bank.id}')">대출받기</button>`}
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function renderPortfolio(portfolio, market) {
            document.getElementById('cash-value').innerText = formatCurrency(portfolio.cash);
            
            let totalLoan = 0;
            for (const [id, debt] of Object.entries(portfolio.loans)) {
                totalLoan += debt;
            }
            document.getElementById('loan-value').innerText = formatCurrency(totalLoan);
            
            let stockAsset = 0;
            const myStocksEl = document.getElementById('my-stocks');
            myStocksEl.innerHTML = '';

            const holdings = portfolio.holdings;
            // [수정] 파이썬 서버의 객체 구조(data.amount)에 맞춰서 확인
            const hasHoldings = Object.values(holdings).some(data => data.amount > 0);

            if (!hasHoldings) {
                myStocksEl.innerHTML = `
                    <div style="text-align:center; padding:30px 10px; color:var(--secondary-text); font-size:0.85rem; background:rgba(0,0,0,0.1); border-radius:12px;">
                        보유 중인 주식이 없습니다.
                    </div>`;
            } else {
                for (const [id, data] of Object.entries(holdings)) {
                    // [수정] data가 객체이므로 data.amount를 가져와야 함
                    const qty = data.amount; 
                    if (qty > 0) {
                        const stock = market.find(s => s.id == id);
                        if (stock) {
                            const totalVal = stock.price * qty;
                            stockAsset += totalVal;
                            
                            // 서버에서 계산해서 보내준 수익률 사용 (data.profit_rate)
                            const pRate = data.profit_rate || 0;

                            myStocksEl.innerHTML += `
                                <div class="my-stock" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <div style="display: flex; flex-direction: column; gap: 2px;">
                                        <span style="font-weight: 600; font-size: 0.95rem;">${stock.name}</span>
                                        <span style="font-size: 0.8rem; color: var(--secondary-text);">${qty}주 보유</span>
                                    </div>
                                    <div style="text-align: right;">
                                        <div style="font-weight: 700; font-size: 0.95rem;">${formatCurrency(totalVal)}</div>
                                        <div style="font-size: 0.75rem; color: ${pRate >= 0 ? 'var(--up-color)' : 'var(--down-color)'};">
                                            ${pRate > 0 ? '▲' : pRate < 0 ? '▼' : ''} ${Math.abs(pRate)}%
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                }
            }

            document.getElementById('total-asset-value').innerText = formatCurrency(portfolio.cash + stockAsset - totalLoan);
        }

        function selectStock(stock) {
            selectedStockId = stock.id;
            document.querySelectorAll('.stock-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`stock-${stock.id}`).classList.add('selected');
            document.getElementById('selected-title').innerText = `${stock.name} 선택됨`;
            document.getElementById('trade-amount').value = '';
            document.getElementById('msg-box').innerText = '';
        }

        function showMessage(msg, isError=false) {
            const box = document.getElementById('msg-box');
            box.style.color = isError ? '#ef4444' : '#10b981';
            box.innerText = msg;
            setTimeout(() => { box.innerText = ''; }, 3000);
        }

        async function trade(action) {
            if (!selectedStockId) {
                showMessage("먼저 종목을 선택해주세요.", true);
                return;
            }
            const amount = parseInt(document.getElementById('trade-amount').value);
            if (!amount || amount <= 0) {
                showMessage("올바른 수량을 입력해주세요.", true);
                return;
            }

            try {
                const res = await fetch('/api/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, id: selectedStockId, amount: amount })
                });
                const result = await res.json();
                
                if (result.success) {
                    showMessage(result.message);
                    fetchState();
                } else {
                    showMessage(result.message, true);
                }
            } catch(e) {
                showMessage("서버 통신 오류", true);
            }
        }

        async function handleBank(action, bankId) {
            try {
                const res = await fetch('/api/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, bank_id: bankId })
                });
                const result = await res.json();
                if (result.success) {
                    showMessage(result.message);
                    fetchState();
                } else {
                    showMessage(result.message, true);
                }
            } catch(e) {
                showMessage("서버 통신 오류", true);
            }
        }

        setInterval(fetchState, 1500);
        window.addEventListener('load', fetchState);
    </script>
</body>
</html>
